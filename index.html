<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live-Abfahrtsmonitor</title>

<style>
body{
margin:0;
background:#0b2d2d;
color:white;
font-family:Arial,sans-serif;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 50px;
border-bottom:2px solid #d4af37;
}

.title{
font-size:52px;
font-weight:bold;
}

.subtitle{
font-size:28px;
color:#d4af37;
margin-top:10px;
}

.clock{
text-align:right;
}

.time{
font-size:70px;
font-weight:bold;
}

.date{
font-size:28px;
}

.container{
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
font-size:34px;
}

th{
background:white;
color:black;
padding:18px;
}

td{
padding:18px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.minutes{
text-align:right;
font-weight:bold;
color:#ffd166;
}

.footer{
position:fixed;
bottom:0;
width:100%;
background:#062020;
padding:15px;
text-align:center;
font-size:20px;
}
</style>

<script>
function updateClock(){
const now = new Date();

document.getElementById("time").innerHTML =
now.toLocaleTimeString("de-AT",{
hour:"2-digit",
minute:"2-digit"
});

document.getElementById("date").innerHTML =
now.toLocaleDateString("de-AT",{
weekday:"long",
day:"2-digit",
month:"long",
year:"numeric"
});
}

setInterval(updateClock,1000);
</script>

</head>

<body onload="updateClock()">

<div class="header">

<div>
<div class="title">Live-Abfahrtsmonitor</div>
<div class="subtitle">Haltestelle Hatschekstraße</div>
</div>

<div class="clock">
<div id="time" class="time"></div>
<div id="date" class="date"></div>
</div>

</div>

<div class="container">

<table>

<tr>
<th>Linie</th>
<th>Richtung</th>
<th>Abfahrt</th>
</tr>

<tr>
<td>41</td>
<td>Hessenplatz</td>
<td class="minutes">2 Min</td>
</tr>

<tr>
<td>43</td>
<td>Stadtfriedhof</td>
<td class="minutes">4 Min</td>
</tr>

<tr>
<td>43</td>
<td>Hessenplatz</td>
<td class="minutes">7 Min</td>
</tr>

<tr>
<td>41</td>
<td>Baintwiese</td>
<td class="minutes">9 Min</td>
</tr>

</table>

</div>

<div class="footer">
Daten werden automatisch aktualisiert
</div>

</body>
</html>
